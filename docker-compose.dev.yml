version: '3.8'

# Development Docker Compose
# Provides hot-reload for both frontend and backend

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: polars-analysis-backend:dev
    container_name: polars-analysis-backend-dev

    ports:
      - "8000:8000"

    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./database/app.db
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - LOG_LEVEL=debug
      # Resource limits for dev
      - POLARS_MAX_THREADS=4
      - MAX_CONCURRENT_ENGINES=5
      - WORKERS=1

    volumes:
      # Mount source for hot reload
      - ./backend:/app/backend:ro
      # Mount data directory
      - ./data:/app/data

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: polars-analysis-frontend:dev
    container_name: polars-analysis-frontend-dev

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=http://localhost:8000

    volumes:
      # Mount source for hot reload
      - ./frontend:/app:ro
      # Don't mount node_modules
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0

    depends_on:
      - backend
